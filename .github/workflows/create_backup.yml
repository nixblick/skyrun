name: Database Backup
on:
  schedule:
    - cron: '0 2 * * 1'  # Jeden Montag um 02:00 UTC
  workflow_dispatch:       # Manuell ausloesbar

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass

      - name: Create trigger file
        run: |
          cat > run_backup.php << 'PHPEOF'
          <?php
          // Auto-generiert von GitHub Actions
          $_GET['token'] = getenv('BACKUP_TOKEN') ?: '${{ secrets.BACKUP_TOKEN }}';
          require_once __DIR__ . '/create_backup.php';
          PHPEOF

      - name: Upload trigger file via SFTP
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun
          put run_backup.php
          bye
          EOF

      - name: Execute backup via HTTP
        run: |
          # Warte kurz bis Datei verfuegbar
          sleep 5
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -L -k \
            "https://mein-computerfreund.de/skyrun/run_backup.php")
          echo "HTTP Status: $RESPONSE"
          cat response.txt
          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::HTTP-Trigger Status $RESPONSE - pruefe Backup manuell"
          fi

      - name: Verify and cleanup
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Pruefe Backup-Dateien und raeume auf..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun
          rm run_backup.php
          cd backups
          ls -lt
          bye
          EOF
