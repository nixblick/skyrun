name: Database Backup
on:
  schedule:
    - cron: '0 2 * * 1'  # Jeden Montag um 02:00 UTC
  workflow_dispatch:       # Manuell ausloesbar

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass

      - name: Run backup via SSH
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p 2222 \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} \
            "cd /htdocs/html/skyrun && php create_backup.php token=${{ secrets.BACKUP_TOKEN }}" \
            2>&1 || true

          # Fallback: HTTP-Trigger falls SSH-Exec nicht unterstuetzt
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L -k \
            "https://${{ secrets.FTP_SERVER }}/skyrun/create_backup.php?token=${{ secrets.BACKUP_TOKEN }}")
          echo "HTTP Trigger Status: $RESPONSE"

      - name: Verify backup exists
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Pruefe Backup-Dateien..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun/backups
          ls -lt | head -5
          bye
          EOF
