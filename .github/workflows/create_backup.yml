name: Database Backup
on:
  schedule:
    - cron: '0 2 * * 1'  # Jeden Montag um 02:00 UTC
  workflow_dispatch:       # Manuell ausloesbar

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup via API
        run: |
          echo "Rufe Backup-Endpoint auf..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -L -k \
            "https://www.mein-computerfreund.de/api.php?action=createBackup&token=${{ secrets.BACKUP_TOKEN }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if echo "$BODY" | grep -q '"success":true'; then
            echo "Backup erfolgreich!"
          else
            echo "::error::Backup fehlgeschlagen"
            exit 1
          fi

      - name: Verify backup files
        run: |
          sudo apt-get install -y -qq sshpass
          echo "Pruefe Backup-Dateien..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun/backups
          ls -l
          bye
          EOF
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
