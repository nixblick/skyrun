name: Database Backup
on:
  schedule:
    - cron: '0 2 * * 1'  # Jeden Montag um 02:00 UTC
  workflow_dispatch:       # Manuell ausloesbar

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup via HTTP
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.FTP_SERVER }}/skyrun/create_backup.php?token=${{ secrets.BACKUP_TOKEN }}")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "FEHLER: Backup fehlgeschlagen (HTTP $RESPONSE)"
            exit 1
          fi
          echo "Backup erfolgreich ausgeloest"

      - name: Verify backup exists
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y -qq sshpass
          echo "Pruefe Backup-Dateien..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun/backups
          ls -lt | head -5
          bye
          EOF
