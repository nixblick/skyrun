name: SFTP Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      
      - name: Create exclude file
        run: |
          cat > exclude.txt << 'EXCL'
          .git/
          .github/
          .gitignore
          *.sql
          *.code-workspace
          *.log
          config.php
          config.php.example
          README.md
          CHANGELOG.md
          TODO.md
          EXCL
      
      - name: Prepare files for upload
        run: |
          mkdir -p temp_deploy
          rsync -av --exclude-from=exclude.txt . temp_deploy/
      
      - name: SFTP Upload
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e sftp -o StrictHostKeyChecking=no -P 2222 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << EOF
          cd /htdocs/html/skyrun/
          lcd temp_deploy
          put -r .
          bye
          EOF